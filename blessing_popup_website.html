<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日祝福弹窗</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: linear-gradient(135deg, #ffe6f2, #e8f4ff, #fff8d6);
      overflow: hidden;
    }

    .page-title {
      text-align: center;
      color: #444;
      padding: 24px;
    }

    .page-title h1 {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .page-title p {
      font-size: 18px;
      color: #666;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    .modal {
      width: min(420px, calc(100vw - 40px));
      padding: 32px 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      text-align: center;
      animation: popIn 0.35s ease;
    }

    .emoji {
      font-size: 46px;
      margin-bottom: 14px;
    }

    .message {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      line-height: 1.45;
      color: #333;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .ok-btn {
      border: none;
      border-radius: 999px;
      padding: 13px 34px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #ff85b3, #7cb8ff);
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(255, 133, 179, 0.35);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .ok-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 14px 30px rgba(255, 133, 179, 0.45);
    }

    .ok-btn:active {
      transform: scale(0.97);
    }

    .floating-heart {
      position: fixed;
      bottom: -40px;
      font-size: 24px;
      animation: floatUp 6s linear infinite;
      opacity: 0.7;
      pointer-events: none;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.86) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      15% {
        opacity: 0.8;
      }
      to {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page-title">
    <h1>今日份小祝福</h1>
    <p>点一下“好哒！”，收下一条新的祝福。</p>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal" id="modal">
      <div class="emoji" id="emoji">🌷</div>
      <div class="message" id="message">今天要开心！</div>
      <button class="ok-btn" id="okBtn">好哒！</button>
    </div>
  </div>

  <script>
    const blessings = [
      "今天要开心！",
      "今天一起顺利！",
      "愿你今天被温柔以待。",
      "所有的小烦恼都快快走开。",
      "今天也要记得好好吃饭。",
      "愿你的努力都有回响。",
      "今天会有好事情发生。",
      "保持微笑，幸运会靠近你。",
      "愿你心情像阳光一样明亮。",
      "今天的你也很棒。",
      "愿你一路顺风，万事顺意。",
      "愿你做什么都刚刚好。",
      "今天也要相信自己。",
      "愿你被好运轻轻抱住。",
      "愿所有期待都慢慢实现。",
      "今天少一点压力，多一点快乐。",
      "愿你遇见可爱的人和事。",
      "今天也要平安顺遂。",
      "愿你眼里有光，心里有糖。",
      "新的一天，继续闪闪发光。",
      "愿你每天都有新的小确幸。",
      "愿你抬头遇见好天气。",
      "愿你心里的愿望慢慢开花。",
      "今天也请对自己温柔一点。",
      "愿你一路都有好运相伴。",
      "愿你的笑容比昨天更多。",
      "愿你所想皆有答案。",
      "愿你所行皆是坦途。",
      "今天也要元气满满。",
      "愿你遇到的人都真诚善良。",
      "愿所有疲惫都被治愈。",
      "愿你睡得香，醒来有力量。",
      "愿你心中有暖，脚下有路。",
      "愿你把普通日子过得闪亮。",
      "今天也会有值得期待的瞬间。",
      "愿你不慌不忙，稳稳向前。",
      "愿你收获满满的快乐。",
      "愿你做自己喜欢的事。",
      "愿你被世界轻轻喜欢着。",
      "愿你今天不为小事烦心。",
      "愿你有勇气，也有好运气。",
      "愿你走到哪里都有光。",
      "愿你心想事成，万事胜意。",
      "愿你今天甜甜的。",
      "愿你所有努力都不被辜负。",
      "愿你遇见惊喜，也遇见安心。",
      "愿你拥有轻松自在的一天。",
      "愿你眼前有风景，心中有欢喜。",
      "愿你今天比昨天更自在。",
      "愿你一直被爱与好运包围。"
    ];

    const emojis = ["🌷", "☀️", "🍀", "🌈", "✨", "🎈", "💐", "⭐", "🧸", "💗"];

    let index = 0;

    const modal = document.getElementById("modal");
    const message = document.getElementById("message");
    const emoji = document.getElementById("emoji");
    const okBtn = document.getElementById("okBtn");

    function showBlessing() {
      message.textContent = blessings[index];
      emoji.textContent = emojis[index % emojis.length];
      modal.style.animation = "none";
      modal.offsetHeight;
      modal.style.animation = "popIn 0.35s ease";
    }

    okBtn.addEventListener("click", () => {
      index = (index + 1) % blessings.length;
      showBlessing();
    });

    function createFloatingHeart() {
      const heart = document.createElement("div");
      heart.className = "floating-heart";
      heart.textContent = ["💗", "🌸", "✨", "🍀", "🌟"][Math.floor(Math.random() * 5)];
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = 4 + Math.random() * 4 + "s";
      heart.style.fontSize = 18 + Math.random() * 20 + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 8000);
    }

    setInterval(createFloatingHeart, 500);
    showBlessing();
  </script>
</body>
</html>
